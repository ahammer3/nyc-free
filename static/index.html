<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ffffff">
    <title>NYC Free Events Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

        #map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; }

        /* Top bar */
        #top-bar {
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
            padding: 10px 20px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }
        #top-bar h1 {
            font-size: 16px;
            font-weight: 700;
            white-space: nowrap;
        }
        #date-input {
            padding: 6px 10px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            cursor: pointer;
        }
        #date-input:focus { outline: none; border-color: #6366f1; }
        #event-count {
            font-size: 13px;
            color: #6b7280;
            white-space: nowrap;
        }
        .nav-btn {
            background: none;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 4px 8px;
            cursor: pointer;
            font-size: 16px;
            color: #374151;
        }
        .nav-btn:hover { background: #f3f4f6; }

        /* Sidebar */
        #sidebar {
            position: absolute;
            top: 70px;
            left: 12px;
            width: 340px;
            max-height: calc(100vh - 100px);
            z-index: 1000;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #sidebar.collapsed {
            transform: translateX(-352px);
        }
        #sidebar-toggle {
            position: absolute;
            top: 80px;
            left: 12px;
            z-index: 1001;
            background: white;
            border: none;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
            width: 36px;
            height: 36px;
            cursor: pointer;
            font-size: 18px;
            display: none;
            align-items: center;
            justify-content: center;
        }
        #sidebar-toggle.visible { display: flex; }

        #sidebar-header {
            padding: 14px 16px;
            border-bottom: 1px solid #f3f4f6;
            font-weight: 600;
            font-size: 14px;
            color: #374151;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #sidebar-close {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #9ca3af;
            display: none;
        }

        /* Draggable panels */
        .draggable-header {
            cursor: grab;
            -webkit-user-select: none;
            user-select: none;
        }
        .draggable-header:active { cursor: grabbing; }
        .dragging {
            opacity: 0.9;
            transition: none !important;
        }

        /* Minimize toggles */
        .minimize-btn {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: #9ca3af;
            padding: 4px;
            line-height: 1;
            transition: transform 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .minimize-btn:hover { color: #6b7280; }
        .minimize-btn.minimized { transform: rotate(180deg); }

        /* Sidebar minimized: only show header */
        #sidebar.minimized {
            bottom: auto !important;
            max-height: none !important;
        }
        #sidebar.minimized #distance-filter,
        #sidebar.minimized #time-filter,
        #sidebar.minimized #category-filters,
        #sidebar.minimized #event-list {
            display: none !important;
        }

        /* Legend minimized: only show title row */
        #legend.minimized #legend-items,
        #legend.minimized .legend-row {
            display: none !important;
        }

        /* Distance filter */
        #distance-filter {
            padding: 10px 14px;
            border-bottom: 1px solid #f3f4f6;
            display: none; /* shown once we have location */
        }
        #distance-filter.visible { display: block; }
        #distance-filter-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        #distance-filter-header label {
            font-size: 12px;
            font-weight: 600;
            color: #374151;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #distance-toggle {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #6366f1;
        }
        #distance-value {
            font-size: 12px;
            font-weight: 600;
            color: #6366f1;
            min-width: 48px;
            text-align: right;
        }
        #distance-slider {
            width: 100%;
            cursor: pointer;
            accent-color: #6366f1;
            margin-top: 2px;
        }
        #distance-slider:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        #location-status {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 4px;
        }
        .location-btn {
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 6px;
            padding: 5px 10px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        .location-btn:hover { background: #4f46e5; }

        /* Time filter */
        #time-filter {
            padding: 10px 14px;
            border-bottom: 1px solid #f3f4f6;
        }
        #time-filter-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        #time-filter-header label {
            font-size: 12px;
            font-weight: 600;
            color: #374151;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        #time-toggle {
            width: 16px;
            height: 16px;
            cursor: pointer;
            accent-color: #6366f1;
        }
        #time-range-label {
            font-size: 12px;
            font-weight: 600;
            color: #6366f1;
            text-align: right;
        }
        #time-hint {
            font-size: 11px;
            color: #9ca3af;
            margin-top: 4px;
        }

        /* Dual range slider */
        .dual-range {
            position: relative;
            height: 24px;
            margin-top: 2px;
        }
        .dual-range input[type="range"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            margin: 0;
            height: 24px;
        }
        .dual-range input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            pointer-events: all;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #6366f1;
            border: 2px solid #fff;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
            cursor: pointer;
            position: relative;
            z-index: 2;
        }
        .dual-range input[type="range"]::-moz-range-thumb {
            pointer-events: all;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #6366f1;
            border: 2px solid #fff;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
            cursor: pointer;
        }
        .dual-range input[type="range"]::-webkit-slider-runnable-track {
            height: 4px;
            border-radius: 2px;
            background: transparent;
        }
        .dual-range input[type="range"]::-moz-range-track {
            height: 4px;
            border-radius: 2px;
            background: transparent;
        }
        .dual-range-track {
            position: absolute;
            top: 10px;
            left: 0;
            right: 0;
            height: 4px;
            border-radius: 2px;
            background: #e5e7eb;
        }
        .dual-range-fill {
            position: absolute;
            top: 10px;
            height: 4px;
            border-radius: 2px;
            background: #6366f1;
        }
        .dual-range.disabled input[type="range"] { pointer-events: none; }
        .dual-range.disabled input[type="range"]::-webkit-slider-thumb {
            background: #d1d5db;
            cursor: not-allowed;
        }
        .dual-range.disabled .dual-range-fill { background: #d1d5db; }
        .dual-range.disabled { opacity: 0.3; }

        /* Category filter bar */
        #category-filters {
            padding: 10px 12px;
            border-bottom: 1px solid #f3f4f6;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .cat-filter-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 20px;
            border: 2px solid transparent;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .cat-filter-btn .cat-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .cat-filter-btn.active {
            opacity: 1;
        }
        .cat-filter-btn.inactive {
            opacity: 0.35;
            filter: grayscale(0.5);
        }
        .cat-filter-btn .cat-count {
            font-weight: 400;
            opacity: 0.7;
        }

        #event-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        .event-item {
            padding: 10px 16px;
            cursor: pointer;
            border-bottom: 1px solid #f9fafb;
            transition: background 0.15s;
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }
        .event-item:hover { background: #f3f4f6; }
        .event-item:active { background: #e5e7eb; }
        .event-item.active { background: #eef2ff; }
        .event-item.inactive-today {
            opacity: 0.45;
        }
        .cat-filter-btn { transition: transform 0.1s, background 0.15s, border-color 0.15s; }
        .cat-filter-btn:active { transform: scale(0.95); }
        .nav-btn { transition: transform 0.1s, background 0.15s; }
        .nav-btn:active { transform: scale(0.92); }
        .location-btn { transition: transform 0.1s, background 0.15s; }
        .location-btn:active { transform: scale(0.95); }
        .inactive-badge {
            display: inline-block;
            font-size: 10px;
            background: #f3f4f6;
            color: #9ca3af;
            padding: 1px 6px;
            border-radius: 4px;
            margin-top: 3px;
        }
        .event-item-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
            margin-top: 3px;
        }
        .event-item-content { flex: 1; min-width: 0; }
        .event-title {
            font-size: 13px;
            font-weight: 600;
            color: #1f2937;
            margin-bottom: 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .event-meta {
            font-size: 11px;
            color: #6b7280;
        }
        .event-tag {
            display: inline-block;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 4px;
            margin-right: 4px;
            margin-top: 3px;
            font-weight: 500;
        }
        .no-location-badge {
            display: inline-block;
            font-size: 10px;
            background: #fef3c7;
            color: #92400e;
            padding: 1px 6px;
            border-radius: 4px;
            margin-top: 3px;
        }

        .section-header {
            padding: 8px 16px 4px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #9ca3af;
        }

        /* Legend */
        #legend {
            position: absolute;
            bottom: 24px;
            right: 12px;
            z-index: 999;
            background: white;
            padding: 10px 14px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.12);
            font-size: 12px;
        }
        .legend-row { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
        .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }

        /* Popup styling */
        .event-popup { max-width: 280px; }
        .event-popup img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 8px;
        }
        .event-popup h3 {
            font-size: 14px;
            margin-bottom: 4px;
            color: #1f2937;
        }
        .event-popup .popup-categories {
            margin-bottom: 6px;
        }
        .event-popup .popup-cat-badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 10px;
            margin-right: 4px;
            margin-bottom: 2px;
        }
        .event-popup .popup-time {
            font-size: 12px;
            color: #6366f1;
            margin-bottom: 4px;
        }
        .event-popup .popup-address {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 6px;
        }
        .event-popup .popup-desc {
            font-size: 12px;
            color: #4b5563;
            line-height: 1.4;
            margin-bottom: 8px;
        }
        .event-popup .popup-link {
            display: inline-block;
            font-size: 12px;
            color: #6366f1;
            text-decoration: none;
            font-weight: 600;
        }
        .event-popup .popup-link:hover { text-decoration: underline; }
        .event-popup .popup-unknown {
            font-size: 11px;
            background: #fef3c7;
            color: #92400e;
            padding: 4px 8px;
            border-radius: 4px;
            margin-bottom: 8px;
            display: inline-block;
        }

        /* Leaflet popup overrides */
        .leaflet-popup-content-wrapper {
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }
        .leaflet-popup-content { margin: 12px 14px; }

        /* Sidebar count badge — hidden by default, shown on mobile via media query */
        #sidebar-count { display: none; }

        /* Loading */
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1002;
            background: white;
            padding: 16px 28px;
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            font-size: 14px;
            color: #6b7280;
            display: none;
        }

        /* Responsive — mobile-first phone layout */
        @media (max-width: 700px) {
            /* Safe area for notched phones */
            body {
                padding-top: env(safe-area-inset-top);
                padding-bottom: env(safe-area-inset-bottom);
            }

            /* Top bar: compact, full width */
            #top-bar {
                left: 8px;
                right: 8px;
                top: calc(8px + env(safe-area-inset-top));
                transform: none;
                padding: 8px 12px;
                gap: 6px;
                border-radius: 10px;
            }
            #top-bar h1 { display: none; }
            #date-input {
                font-size: 16px; /* prevents iOS zoom on focus */
                padding: 6px 8px;
                min-width: 0;
                flex: 1;
            }
            .nav-btn {
                width: 44px;
                height: 44px;
                font-size: 18px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 8px;
                flex-shrink: 0;
            }
            #event-count { display: none; }
            .location-btn#locate-me-btn {
                width: 44px;
                height: 44px;
                padding: 0;
                font-size: 0;
                border-radius: 8px;
                flex-shrink: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                position: relative;
            }
            .location-btn#locate-me-btn::before {
                content: '';
                width: 18px;
                height: 18px;
                background: white;
                -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><circle cx='12' cy='12' r='3'/><path d='M12 2v3M12 19v3M2 12h3M19 12h3'/></svg>") center/contain no-repeat;
                mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='black' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><circle cx='12' cy='12' r='3'/><path d='M12 2v3M12 19v3M2 12h3M19 12h3'/></svg>") center/contain no-repeat;
            }

            /* Sidebar becomes bottom sheet */
            #sidebar {
                top: auto;
                left: 0;
                right: 0;
                bottom: 0;
                width: 100%;
                max-height: 85vh;
                border-radius: 16px 16px 0 0;
                transform: translateY(calc(100% - 60px));
                transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
                padding-bottom: env(safe-area-inset-bottom);
            }
            #sidebar.collapsed {
                transform: translateY(100%);
            }
            #sidebar.expanded {
                transform: translateY(0);
            }

            /* Minimize buttons are redundant on mobile (bottom sheet already collapses) */
            .minimize-btn { display: none !important; }

            /* Event count in sidebar header on mobile */
            #sidebar-count {
                display: inline-block;
                margin-left: 8px;
                padding: 2px 8px;
                border-radius: 10px;
                background: #eef2ff;
                color: #6366f1;
                font-size: 11px;
                font-weight: 600;
            }

            /* Drag handle for bottom sheet */
            #sidebar-header {
                padding: 8px 16px 10px;
                cursor: grab;
                position: relative;
            }
            #sidebar-header::before {
                content: '';
                display: block;
                width: 36px;
                height: 4px;
                background: #d1d5db;
                border-radius: 2px;
                margin: 0 auto 8px;
            }
            #sidebar-close { display: none !important; }

            /* Toggle pill is redundant on mobile — peek header is the entry point */
            #sidebar-toggle { display: none !important; }

            /* Larger touch targets for filters */
            #distance-toggle, #time-toggle {
                width: 22px;
                height: 22px;
            }
            #distance-filter, #time-filter {
                padding: 8px 16px;
            }
            #distance-filter-header, #time-filter-header {
                margin-bottom: 4px;
            }
            #location-status, #time-hint {
                font-size: 10px;
                margin-top: 2px;
            }
            #distance-slider {
                height: 44px; /* larger touch area */
            }
            .dual-range {
                height: 44px;
            }
            .dual-range input[type="range"] {
                height: 44px;
            }
            .dual-range-track {
                top: 20px;
            }
            .dual-range-fill {
                top: 20px;
            }
            .dual-range input[type="range"]::-webkit-slider-thumb {
                width: 24px;
                height: 24px;
            }

            /* Category filters: horizontally scrollable with fade */
            #category-filters {
                flex-wrap: nowrap;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                scrollbar-width: none;
                padding: 8px 12px;
                -webkit-mask-image: linear-gradient(to right, black 0, black calc(100% - 24px), transparent 100%);
                mask-image: linear-gradient(to right, black 0, black calc(100% - 24px), transparent 100%);
            }
            #category-filters::-webkit-scrollbar { display: none; }
            .cat-filter-btn {
                padding: 7px 12px;
                font-size: 12px;
                flex-shrink: 0;
                min-height: 32px;
            }

            /* Event list: smooth scroll */
            #event-list {
                -webkit-overflow-scrolling: touch;
                overscroll-behavior: contain;
            }
            .event-item {
                padding: 12px 16px;
            }

            /* Hide legend on mobile — category pills serve this purpose */
            #legend { display: none; }

            /* Popup sizing for mobile — wider, more readable */
            .event-popup { max-width: calc(100vw - 80px); }
            .event-popup img { height: 160px; }
            .leaflet-popup-content { margin: 12px 14px; }
            .leaflet-popup-content-wrapper { max-width: calc(100vw - 32px); }
            .leaflet-popup-close-button {
                font-size: 24px !important;
                padding: 8px 10px !important;
                width: 36px !important;
                height: 36px !important;
            }

            /* Prevent text selection on interactive elements */
            .nav-btn, .cat-filter-btn, .location-btn, #sidebar-header {
                -webkit-user-select: none;
                user-select: none;
                -webkit-tap-highlight-color: transparent;
            }
        }

        /* Extra small phones */
        @media (max-width: 380px) {
            #top-bar { padding: 6px 8px; gap: 4px; }
            .nav-btn { width: 38px; height: 38px; }
            .location-btn#locate-me-btn { width: 38px; height: 38px; }
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <div id="top-bar">
        <h1>NYC Free Events</h1>
        <button class="nav-btn" id="prev-day" title="Previous day">&larr;</button>
        <input type="date" id="date-input" />
        <button class="nav-btn" id="next-day" title="Next day">&rarr;</button>
        <span id="event-count"></span>
        <button class="location-btn" id="locate-me-btn" title="Use my location">My Location</button>
    </div>

    <div id="sidebar">
        <div id="sidebar-header" class="draggable-header">
            <span>Events<span id="sidebar-count"></span></span>
            <div style="display:flex; align-items:center; gap:4px;">
                <button class="minimize-btn" id="sidebar-minimize" title="Minimize">&#x25B2;</button>
                <button id="sidebar-close" title="Close sidebar">&times;</button>
            </div>
        </div>
        <div id="distance-filter">
            <div id="distance-filter-header">
                <label>
                    <input type="checkbox" id="distance-toggle" checked />
                    Nearby only
                </label>
                <span id="distance-value">2 mi</span>
            </div>
            <input type="range" id="distance-slider" min="0.5" max="3" step="0.25" value="2" />
            <div id="location-status"></div>
        </div>
        <div id="time-filter">
            <div id="time-filter-header">
                <label>
                    <input type="checkbox" id="time-toggle" />
                    Time window
                </label>
                <span id="time-range-label">10 AM – 6 PM</span>
            </div>
            <div style="display:flex; align-items:center; gap:8px;">
                <div class="dual-range disabled" id="time-range" style="flex:1;">
                    <div class="dual-range-track"></div>
                    <div class="dual-range-fill" id="time-range-fill"></div>
                    <input type="range" id="time-slider-min" min="0" max="95" step="1" value="40" />
                    <input type="range" id="time-slider-max" min="0" max="95" step="1" value="72" />
                </div>
                <button class="location-btn" id="time-now-btn" style="padding:3px 8px; font-size:10px;">Now</button>
            </div>
            <div id="time-hint">Multi-day events always shown</div>
        </div>
        <div id="category-filters"></div>
        <div id="event-list"></div>
    </div>

    <button id="sidebar-toggle" title="Show events list">&#9776; Events</button>

    <div id="legend">
        <div id="legend-header" class="draggable-header" style="font-weight:600; margin-bottom:6px; display:flex; justify-content:space-between; align-items:center;">
            Categories
            <button class="minimize-btn" id="legend-minimize" title="Minimize">&#x25B2;</button>
        </div>
        <div id="legend-items"></div>
        <div class="legend-row" style="margin-top:6px; padding-top:6px; border-top:1px solid #e5e7eb;">
            <div class="legend-dot" style="background:#3b82f6; border: 3px solid #fff; box-shadow: 0 0 0 1.5px #3b82f6;"></div>
            Your location
        </div>
        <div class="legend-row">
            <div class="legend-dot" style="background:#9ca3af; border: 2px dashed #6b7280;"></div>
            No fixed location
        </div>
    </div>

    <div id="loading">Loading events...</div>

    <script>
        // ── Category colors ──────────────────────────────────────────────
        const CATEGORY_COLORS = {
            'Food & Drink':          { fill: '#ef4444', bg: '#fef2f2', text: '#991b1b', border: '#fecaca' },
            'Art & Museums':         { fill: '#8b5cf6', bg: '#f5f3ff', text: '#5b21b6', border: '#ddd6fe' },
            'Music & Entertainment': { fill: '#ec4899', bg: '#fdf2f8', text: '#9d174d', border: '#fbcfe8' },
            'Sports & Fitness':      { fill: '#10b981', bg: '#ecfdf5', text: '#065f46', border: '#a7f3d0' },
            'Shopping & Pop-Ups':    { fill: '#f59e0b', bg: '#fffbeb', text: '#92400e', border: '#fde68a' },
            'Community & Culture':   { fill: '#3b82f6', bg: '#eff6ff', text: '#1e40af', border: '#bfdbfe' },
            'Beauty & Wellness':     { fill: '#f472b6', bg: '#fdf2f8', text: '#be185d', border: '#fbcfe8' },
            'Kids & Family':         { fill: '#06b6d4', bg: '#ecfeff', text: '#155e75', border: '#a5f3fc' },
            'Other':                 { fill: '#6b7280', bg: '#f9fafb', text: '#374151', border: '#d1d5db' },
        };

        function getCatColor(category) {
            return CATEGORY_COLORS[category] || CATEGORY_COLORS['Other'];
        }

        // Primary category = first in the list
        function primaryCategory(event) {
            return (event.categories && event.categories[0]) || 'Other';
        }

        // ── State ────────────────────────────────────────────────────────
        let events = [];
        let markers = [];
        let activeEventId = null;
        let activeCategories = new Set(Object.keys(CATEGORY_COLORS));

        // ── User location state ──────────────────────────────────────────
        let userLat = null;
        let userLng = null;
        let userMarker = null;
        let radiusCircle = null;
        let distanceFilterEnabled = false;
        let distanceRadius = 2; // miles

        // ── Time filter state ────────────────────────────────────────────
        let timeFilterEnabled = false;
        let timeMinFrom = 600;  // 10:00 AM = 40 * 15
        let timeMinTo = 1080;   // 6:00 PM  = 72 * 15

        // ── Map ──────────────────────────────────────────────────────────
        const map = L.map('map', { zoomControl: true }).setView([40.745, -73.985], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            maxZoom: 19,
        }).addTo(map);

        // ── Date picker ──────────────────────────────────────────────────
        const dateInput = document.getElementById('date-input');
        const today = new Date();
        dateInput.value = today.toISOString().split('T')[0];

        document.getElementById('prev-day').addEventListener('click', () => shiftDate(-1));
        document.getElementById('next-day').addEventListener('click', () => shiftDate(1));
        dateInput.addEventListener('change', () => loadEvents());

        function shiftDate(days) {
            const d = new Date(dateInput.value + 'T12:00:00');
            d.setDate(d.getDate() + days);
            dateInput.value = d.toISOString().split('T')[0];
            loadEvents();
        }

        // ── Format helpers ───────────────────────────────────────────────
        function formatTime(isoStr) {
            const d = new Date(isoStr);
            return d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
        }
        function formatDateRange(start, end, event) {
            const s = new Date(start);
            const e = new Date(end);
            const sameDay = s.toDateString() === e.toDateString();
            if (sameDay) {
                return `${formatTime(start)} – ${formatTime(end)}`;
            }
            const opts = { month: 'short', day: 'numeric' };
            let range = `${s.toLocaleDateString('en-US', opts)} – ${e.toLocaleDateString('en-US', opts)}`;
            // Append parsed operating hours if available
            if (event && event.operating_hours) {
                range += ` · ${minutesToLabel(event.operating_hours.open)} – ${minutesToLabel(event.operating_hours.close)}`;
            }
            return range;
        }
        function escHtml(str) {
            const div = document.createElement('div');
            div.textContent = str || '';
            return div.innerHTML;
        }

        // ── Haversine distance (miles) ───────────────────────────────────
        function haversineDistance(lat1, lng1, lat2, lng2) {
            const R = 3958.8; // Earth radius in miles
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) ** 2 +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLng / 2) ** 2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        function getEventDistance(event) {
            if (userLat == null || event.lat == null) return null;
            return haversineDistance(userLat, userLng, event.lat, event.lng);
        }

        // ── Geolocation ──────────────────────────────────────────────────
        function requestLocation() {
            const statusEl = document.getElementById('location-status');
            statusEl.textContent = 'Locating...';

            if (!navigator.geolocation) {
                statusEl.textContent = 'Geolocation not supported';
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    userLat = pos.coords.latitude;
                    userLng = pos.coords.longitude;
                    statusEl.textContent = `Location found`;
                    document.getElementById('distance-filter').classList.add('visible');
                    distanceFilterEnabled = document.getElementById('distance-toggle').checked;
                    placeUserMarker();
                    updateRadiusCircle();
                    renderMarkers();
                    renderSidebar();
                    updateCount();
                },
                (err) => {
                    console.error('Geolocation error:', err);
                    statusEl.textContent = err.code === 1 ? 'Location access denied' : 'Could not get location';
                },
                { enableHighAccuracy: true, timeout: 10000 }
            );
        }

        function placeUserMarker() {
            if (userMarker) map.removeLayer(userMarker);
            if (userLat == null) return;

            userMarker = L.circleMarker([userLat, userLng], {
                radius: 8,
                fillColor: '#3b82f6',
                fillOpacity: 1,
                color: '#fff',
                weight: 3,
            }).addTo(map);

            // Pulsing outer ring
            const pulse = L.circleMarker([userLat, userLng], {
                radius: 14,
                fillColor: '#3b82f6',
                fillOpacity: 0.15,
                color: '#3b82f6',
                weight: 1.5,
                opacity: 0.4,
            }).addTo(map);

            userMarker._pulse = pulse;
            userMarker.bindTooltip('You are here', { direction: 'top', offset: [0, -10] });
        }

        function updateRadiusCircle() {
            if (radiusCircle) map.removeLayer(radiusCircle);
            if (userLat == null || !distanceFilterEnabled) return;

            const radiusMeters = distanceRadius * 1609.34; // miles to meters
            radiusCircle = L.circle([userLat, userLng], {
                radius: radiusMeters,
                fillColor: '#6366f1',
                fillOpacity: 0.04,
                color: '#6366f1',
                weight: 1.5,
                dashArray: '6 4',
                opacity: 0.4,
            }).addTo(map);
        }

        // ── Distance filter controls ─────────────────────────────────────
        document.getElementById('locate-me-btn').addEventListener('click', requestLocation);

        const distanceSlider = document.getElementById('distance-slider');
        const distanceValueEl = document.getElementById('distance-value');
        const distanceToggle = document.getElementById('distance-toggle');

        distanceSlider.addEventListener('input', () => {
            distanceRadius = parseFloat(distanceSlider.value);
            distanceValueEl.textContent = distanceRadius % 1 === 0
                ? `${distanceRadius} mi` : `${distanceRadius.toFixed(1)} mi`;
            updateRadiusCircle();
            renderMarkers();
            renderSidebar();
            updateCount();
        });

        distanceToggle.addEventListener('change', () => {
            distanceFilterEnabled = distanceToggle.checked;
            distanceSlider.disabled = !distanceFilterEnabled;
            updateRadiusCircle();
            renderMarkers();
            renderSidebar();
            updateCount();
        });

        // ── Time filter controls ──────────────────────────────────────────
        const timeSliderMin = document.getElementById('time-slider-min');
        const timeSliderMax = document.getElementById('time-slider-max');
        const timeRangeLabel = document.getElementById('time-range-label');
        const timeRangeEl = document.getElementById('time-range');
        const timeRangeFill = document.getElementById('time-range-fill');
        const timeToggle = document.getElementById('time-toggle');

        function minutesToLabel(mins) {
            const h = Math.floor(mins / 60);
            const m = mins % 60;
            const ampm = h < 12 ? 'AM' : 'PM';
            const h12 = h === 0 ? 12 : h > 12 ? h - 12 : h;
            return m === 0 ? `${h12}:00 ${ampm}` : `${h12}:${String(m).padStart(2, '0')} ${ampm}`;
        }

        function updateTimeRangeUI() {
            timeRangeLabel.textContent = `${minutesToLabel(timeMinFrom)} – ${minutesToLabel(timeMinTo)}`;
            // Update the fill bar position
            const pctMin = (parseInt(timeSliderMin.value) / 95) * 100;
            const pctMax = (parseInt(timeSliderMax.value) / 95) * 100;
            timeRangeFill.style.left = pctMin + '%';
            timeRangeFill.style.width = (pctMax - pctMin) + '%';
        }

        function onTimeSliderInput() {
            let minVal = parseInt(timeSliderMin.value);
            let maxVal = parseInt(timeSliderMax.value);

            // Prevent crossing
            if (minVal > maxVal) {
                if (this === timeSliderMin) {
                    timeSliderMin.value = maxVal;
                    minVal = maxVal;
                } else {
                    timeSliderMax.value = minVal;
                    maxVal = minVal;
                }
            }

            timeMinFrom = minVal * 15;
            timeMinTo = maxVal * 15;
            updateTimeRangeUI();
            renderMarkers();
            renderSidebar();
            updateCount();
        }

        timeSliderMin.addEventListener('input', onTimeSliderInput);
        timeSliderMax.addEventListener('input', onTimeSliderInput);

        timeToggle.addEventListener('change', () => {
            timeFilterEnabled = timeToggle.checked;
            timeRangeEl.classList.toggle('disabled', !timeFilterEnabled);
            renderMarkers();
            renderSidebar();
            updateCount();
        });

        document.getElementById('time-now-btn').addEventListener('click', () => {
            const now = new Date();
            const nowMins = now.getHours() * 60 + now.getMinutes();
            const fromMins = Math.round(nowMins / 15) * 15;
            // Set range: now to +3 hours (or end of day)
            const toMins = Math.min(fromMins + 180, 1425);

            timeMinFrom = fromMins;
            timeMinTo = toMins;
            timeSliderMin.value = fromMins / 15;
            timeSliderMax.value = toMins / 15;
            updateTimeRangeUI();

            if (!timeFilterEnabled) {
                timeFilterEnabled = true;
                timeToggle.checked = true;
                timeRangeEl.classList.remove('disabled');
            }
            renderMarkers();
            renderSidebar();
            updateCount();
        });

        // Initial fill bar position
        updateTimeRangeUI();

        function isEventInTimeWindow(event, fromMins, toMins) {
            let startMins, endMins;

            if (event.is_multi_day) {
                if (event.operating_hours) {
                    // Use parsed operating hours from description
                    startMins = event.operating_hours.open;
                    endMins = event.operating_hours.close;
                } else {
                    // No hours found — always show, user can check event page
                    return true;
                }
            } else {
                const s = new Date(event.start_date);
                const e = new Date(event.end_date);
                startMins = s.getHours() * 60 + s.getMinutes();
                endMins = e.getHours() * 60 + e.getMinutes();
            }

            // Event overlaps with the time window if it starts before window ends
            // AND ends after window starts
            return startMins < toMins && endMins > fromMins;
        }

        // ── Filtering ────────────────────────────────────────────────────
        function isEventVisible(event) {
            const cats = event.categories || ['Other'];
            if (!cats.some(c => activeCategories.has(c))) return false;

            // Distance filter
            if (distanceFilterEnabled && userLat != null && event.lat != null && !event.location_unknown) {
                const dist = haversineDistance(userLat, userLng, event.lat, event.lng);
                if (dist > distanceRadius) return false;
            }

            // Time filter
            if (timeFilterEnabled && !isEventInTimeWindow(event, timeMinFrom, timeMinTo)) {
                return false;
            }

            return true;
        }

        function getVisibleEvents() {
            return events.filter(isEventVisible);
        }

        // ── Load events ──────────────────────────────────────────────────
        async function loadEvents() {
            const loading = document.getElementById('loading');
            loading.style.display = 'block';

            try {
                const resp = await fetch(`/api/events?date=${dateInput.value}`);
                events = await resp.json();
                if (events.error) events = [];
            } catch (e) {
                console.error('Failed to load events:', e);
                events = [];
            }

            loading.style.display = 'none';
            renderCategoryFilters();
            renderMarkers();
            renderSidebar();
            updateCount();
        }

        // ── Category filter bar ──────────────────────────────────────────
        function renderCategoryFilters() {
            const container = document.getElementById('category-filters');

            // Count events per category
            const catCounts = {};
            for (const cat of Object.keys(CATEGORY_COLORS)) {
                catCounts[cat] = 0;
            }
            events.forEach(e => {
                (e.categories || ['Other']).forEach(c => {
                    catCounts[c] = (catCounts[c] || 0) + 1;
                });
            });

            // Only show categories that have events
            const activeCats = Object.keys(CATEGORY_COLORS).filter(c => catCounts[c] > 0);

            const allActive = activeCats.every(c => activeCategories.has(c));
            let html = `<button class="cat-filter-btn ${allActive ? 'active' : 'inactive'}" id="cat-all-btn"
                style="background:#f3f4f6; border-color:${allActive ? '#6b7280' : 'transparent'}; color:#374151;">
                All
            </button>`;
            activeCats.forEach(cat => {
                const color = getCatColor(cat);
                const isActive = activeCategories.has(cat);
                const cls = isActive ? 'active' : 'inactive';
                html += `<button class="cat-filter-btn ${cls}" data-category="${escHtml(cat)}"
                    style="background:${color.bg}; border-color:${isActive ? color.fill : 'transparent'}; color:${color.text};">
                    <span class="cat-dot" style="background:${color.fill}"></span>
                    ${escHtml(cat)}
                    <span class="cat-count">${catCounts[cat]}</span>
                </button>`;
            });

            container.innerHTML = html;

            // Click handlers
            document.getElementById('cat-all-btn').addEventListener('click', () => {
                if (allActive) {
                    activeCategories.clear();
                } else {
                    activeCats.forEach(c => activeCategories.add(c));
                }
                renderCategoryFilters();
                renderMarkers();
                renderSidebar();
                updateCount();
            });

            container.querySelectorAll('.cat-filter-btn[data-category]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const cat = btn.dataset.category;
                    if (activeCategories.has(cat)) {
                        activeCategories.delete(cat);
                    } else {
                        activeCategories.add(cat);
                    }
                    renderCategoryFilters();
                    renderMarkers();
                    renderSidebar();
                    updateCount();
                });
            });
        }

        // ── Markers ──────────────────────────────────────────────────────
        function clearMarkers() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
        }

        function renderMarkers() {
            clearMarkers();
            const visible = getVisibleEvents();

            visible.forEach(event => {
                if (event.lat == null || event.lng == null) return;

                const isUnknown = event.location_unknown;
                const isInactive = event.is_active_today === false;
                const cat = primaryCategory(event);
                const color = getCatColor(cat);

                const marker = L.circleMarker([event.lat, event.lng], {
                    radius: isUnknown ? 8 : (isInactive ? 5 : 7),
                    fillColor: isUnknown ? '#9ca3af' : (isInactive ? '#d1d5db' : color.fill),
                    fillOpacity: isUnknown ? 0.6 : (isInactive ? 0.4 : 0.85),
                    color: isUnknown ? '#6b7280' : '#fff',
                    weight: isUnknown ? 2 : 1.5,
                    dashArray: isUnknown ? '4 3' : null,
                }).addTo(map);

                const mobile = window.innerWidth <= 700;
                marker.bindPopup(buildPopup(event), {
                    maxWidth: mobile ? Math.min(window.innerWidth - 40, 320) : 300,
                    autoPanPadding: mobile ? L.point(20, 100) : L.point(30, 30),
                });
                marker.on('click', () => {
                    setActiveEvent(event.id);
                    // On mobile, collapse sheet to peek so the popup is visible
                    if (mobile && sidebar.classList.contains('expanded')) {
                        sidebar.classList.remove('expanded');
                    }
                });

                marker._eventId = event.id;
                markers.push(marker);
            });
        }

        // ── Popup ────────────────────────────────────────────────────────
        function buildPopup(event) {
            let html = '<div class="event-popup">';

            if (event.image_url) {
                html += `<img src="${event.image_url}" alt="" loading="lazy" />`;
            }

            if (event.location_unknown) {
                html += '<div class="popup-unknown">Location not specified — check event page</div>';
            }

            // Category badges
            html += '<div class="popup-categories">';
            (event.categories || ['Other']).forEach(cat => {
                const color = getCatColor(cat);
                html += `<span class="popup-cat-badge" style="background:${color.bg}; color:${color.text}; border:1px solid ${color.border};">${escHtml(cat)}</span>`;
            });
            html += '</div>';

            html += `<h3>${escHtml(event.title)}</h3>`;
            html += `<div class="popup-time">${formatDateRange(event.start_date, event.end_date, event)}</div>`;

            if (event.address) {
                const dist = getEventDistance(event);
                const distStr = (dist != null && !event.location_unknown)
                    ? ` · <span style="color:#6366f1; font-weight:600;">${dist < 0.1 ? '< 0.1' : dist.toFixed(1)} mi away</span>` : '';
                html += `<div class="popup-address">${escHtml(event.address)}${distStr}</div>`;
            }

            if (event.description) {
                const desc = event.description.length > 200
                    ? event.description.slice(0, 200).trim() + '...'
                    : event.description;
                html += `<div class="popup-desc">${escHtml(desc)}</div>`;
            }

            html += `<a class="popup-link" href="${event.event_url}" target="_blank" rel="noopener">View Event &rarr;</a>`;
            html += '</div>';
            return html;
        }

        // ── Sidebar ──────────────────────────────────────────────────────
        function renderSidebar() {
            const list = document.getElementById('event-list');
            const visible = getVisibleEvents();

            // Split into active today vs not
            const activeToday = visible.filter(e => e.is_active_today !== false);
            const inactiveToday = visible.filter(e => e.is_active_today === false);

            const located = activeToday.filter(e => !e.location_unknown);
            const unlocated = activeToday.filter(e => e.location_unknown);

            let html = '';

            if (located.length > 0) {
                html += '<div class="section-header">Events</div>';
                located.forEach(e => { html += buildEventItem(e); });
            }

            if (unlocated.length > 0) {
                html += '<div class="section-header">No fixed location</div>';
                unlocated.forEach(e => { html += buildEventItem(e); });
            }

            if (inactiveToday.length > 0) {
                html += '<div class="section-header">Not today</div>';
                inactiveToday.forEach(e => { html += buildEventItem(e); });
            }

            if (visible.length === 0) {
                html = '<div style="padding:24px 16px; text-align:center; color:#9ca3af;">No events match the selected filters</div>';
            }

            list.innerHTML = html;

            // Attach click handlers
            list.querySelectorAll('.event-item').forEach(item => {
                item.addEventListener('click', () => {
                    const id = item.dataset.id;
                    const event = events.find(e => e.id === id);
                    if (!event) return;
                    setActiveEvent(id);

                    // On mobile, collapse the bottom sheet to peek so popup is visible
                    if (isMobile && isMobile()) {
                        sidebar.classList.remove('expanded');
                    }

                    const marker = markers.find(m => m._eventId === id);
                    if (marker) {
                        // Slight delay on mobile so sheet collapse animation finishes before panning
                        const delay = (isMobile && isMobile()) ? 320 : 0;
                        setTimeout(() => {
                            map.setView(marker.getLatLng(), 14, { animate: true });
                            marker.openPopup();
                        }, delay);
                    }
                });
            });
        }

        const DAY_NAMES = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

        function buildEventItem(event) {
            const isActive = event.id === activeEventId;
            const isInactive = event.is_active_today === false;
            const cat = primaryCategory(event);
            const color = getCatColor(cat);

            let cls = 'event-item';
            if (isActive) cls += ' active';
            if (isInactive) cls += ' inactive-today';

            let html = `<div class="${cls}" data-id="${event.id}">`;
            html += `<div class="event-item-dot" style="background:${event.location_unknown ? '#9ca3af' : color.fill}"></div>`;
            html += '<div class="event-item-content">';
            html += `<div class="event-title">${escHtml(event.title)}</div>`;
            html += `<div class="event-meta">${formatDateRange(event.start_date, event.end_date, event)}`;
            if (event.address) {
                const shortAddr = event.address.split(',')[0];
                html += ` · ${escHtml(shortAddr)}`;
            }
            const dist = getEventDistance(event);
            if (dist != null && !event.location_unknown) {
                html += ` · <span style="color:#6366f1; font-weight:600;">${dist < 0.1 ? '< 0.1' : dist.toFixed(1)} mi</span>`;
            }
            html += '</div>';
            if (isInactive && event.active_days) {
                const dayStr = event.active_days.map(d => DAY_NAMES[d]).join(', ');
                html += `<span class="inactive-badge">Only ${dayStr}</span> `;
            }
            if (event.location_unknown) {
                html += '<span class="no-location-badge">No fixed location</span> ';
            }
            (event.categories || ['Other']).forEach(cat => {
                const c = getCatColor(cat);
                html += `<span class="event-tag" style="background:${c.bg}; color:${c.text};">${escHtml(cat)}</span>`;
            });
            html += '</div></div>';
            return html;
        }

        function setActiveEvent(id) {
            activeEventId = id;
            document.querySelectorAll('.event-item').forEach(item => {
                item.classList.toggle('active', item.dataset.id === id);
            });
        }

        function updateCount() {
            const el = document.getElementById('event-count');
            const sidebarCountEl = document.getElementById('sidebar-count');
            const visible = getVisibleEvents();
            const n = visible.length;
            const total = events.length;
            let text;
            if (n === total) {
                text = n === 0 ? 'No events' : `${n} event${n !== 1 ? 's' : ''}`;
            } else {
                text = `${n} of ${total} events`;
            }
            el.textContent = text;
            // Sidebar header badge shows just the count
            if (sidebarCountEl) {
                sidebarCountEl.textContent = n === total ? `${n}` : `${n}/${total}`;
            }
        }

        // ── Legend ────────────────────────────────────────────────────────
        function renderLegend() {
            const container = document.getElementById('legend-items');
            let html = '';
            for (const [cat, color] of Object.entries(CATEGORY_COLORS)) {
                html += `<div class="legend-row"><div class="legend-dot" style="background:${color.fill}"></div> ${cat}</div>`;
            }
            container.innerHTML = html;
        }
        renderLegend();

        // ── Sidebar toggle / bottom sheet (mobile) ─────────────────────
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebar-toggle');
        const sidebarClose = document.getElementById('sidebar-close');
        const isMobile = () => window.innerWidth <= 700;

        function checkMobile() {
            if (isMobile()) {
                sidebar.classList.remove('expanded');
                sidebar.classList.remove('collapsed');
                sidebar.classList.remove('minimized');
                sidebarToggle.classList.remove('visible');
                sidebarClose.style.display = 'none';
                // Start in peek state (shows drag handle + header via translateY(calc(100% - 60px)))
            } else {
                sidebar.classList.remove('collapsed');
                sidebar.classList.remove('expanded');
                sidebarToggle.classList.remove('visible');
                sidebarClose.style.display = 'none';
            }
        }

        sidebarToggle.addEventListener('click', () => {
            if (isMobile()) {
                sidebar.classList.add('expanded');
                sidebarToggle.classList.remove('visible');
            } else {
                sidebar.classList.remove('collapsed');
                sidebarToggle.classList.remove('visible');
            }
        });

        sidebarClose.addEventListener('click', () => {
            sidebar.classList.add('collapsed');
            sidebarToggle.classList.add('visible');
        });

        // Bottom sheet: tap header to EXPAND only (collapsing is swipe-only to prevent accidental dismiss)
        const sidebarHeader = document.getElementById('sidebar-header');
        sidebarHeader.addEventListener('click', () => {
            if (!isMobile()) return;
            if (!sidebar.classList.contains('expanded')) {
                // Peek → expanded
                sidebar.classList.add('expanded');
            }
            // When already expanded, tapping header does nothing — swipe down to collapse
        });

        // Touch swipe to dismiss bottom sheet (from anywhere on the sheet)
        let touchStartY = 0;
        let touchCurrentY = 0;
        let isSwiping = false;

        // Also allow swiping from anywhere on the sheet, not just the header
        sidebar.addEventListener('touchstart', (e) => {
            if (!isMobile() || !sidebar.classList.contains('expanded')) return;
            touchStartY = e.touches[0].clientY;
            touchCurrentY = touchStartY;
            isSwiping = true;
        }, { passive: true });

        sidebar.addEventListener('touchmove', (e) => {
            if (!isSwiping || !isMobile()) return;
            touchCurrentY = e.touches[0].clientY;
            const dy = touchCurrentY - touchStartY;
            // Only allow downward drag, and only when at the top of the event list scroll
            const eventList = document.getElementById('event-list');
            const isAtTop = eventList.scrollTop <= 0;
            if (dy > 0 && sidebar.classList.contains('expanded') && isAtTop) {
                sidebar.style.transform = `translateY(${dy}px)`;
            }
        }, { passive: true });

        sidebar.addEventListener('touchend', () => {
            if (!isSwiping || !isMobile()) return;
            isSwiping = false;
            const dy = touchCurrentY - touchStartY;
            sidebar.style.transform = '';
            if (dy > 50 && sidebar.classList.contains('expanded')) {
                // Swipe down far enough — collapse to peek
                sidebar.classList.remove('expanded');
            }
        });

        // ── Minimize toggles ─────────────────────────────────────────────
        document.getElementById('sidebar-minimize').addEventListener('click', (e) => {
            e.stopPropagation(); // don't trigger bottom sheet toggle on mobile
            sidebar.classList.toggle('minimized');
            e.currentTarget.classList.toggle('minimized');
        });

        document.getElementById('legend-minimize').addEventListener('click', () => {
            document.getElementById('legend').classList.toggle('minimized');
            document.getElementById('legend-minimize').classList.toggle('minimized');
        });

        window.addEventListener('resize', checkMobile);
        checkMobile();

        // Auto-request location on mobile
        if (isMobile() && navigator.geolocation) {
            requestLocation();
        }

        // ── Draggable panels ─────────────────────────────────────────────
        function makeDraggable(panel, handle) {
            let startX, startY, startLeft, startTop, dragging = false, moved = false;

            function onStart(clientX, clientY) {
                if (isMobile()) return; // disable drag on mobile (use bottom sheet instead)
                const rect = panel.getBoundingClientRect();
                startX = clientX;
                startY = clientY;
                startLeft = rect.left;
                startTop = rect.top;
                dragging = true;
                moved = false;
                panel.classList.add('dragging');

                // Switch from any right/bottom anchoring to top/left
                panel.style.left = rect.left + 'px';
                panel.style.top = rect.top + 'px';
                panel.style.right = 'auto';
                panel.style.bottom = 'auto';
            }

            function onMove(clientX, clientY) {
                if (!dragging) return;
                const dx = clientX - startX;
                const dy = clientY - startY;
                if (Math.abs(dx) > 3 || Math.abs(dy) > 3) moved = true;
                if (!moved) return;

                let newLeft = startLeft + dx;
                let newTop = startTop + dy;

                // Keep within viewport
                const w = panel.offsetWidth;
                const h = panel.offsetHeight;
                newLeft = Math.max(0, Math.min(window.innerWidth - w, newLeft));
                newTop = Math.max(0, Math.min(window.innerHeight - h, newTop));

                panel.style.left = newLeft + 'px';
                panel.style.top = newTop + 'px';
            }

            function onEnd() {
                dragging = false;
                panel.classList.remove('dragging');
            }

            // Mouse events
            handle.addEventListener('mousedown', (e) => {
                if (e.target.closest('.minimize-btn') || e.target.closest('#sidebar-close')) return;
                e.preventDefault();
                onStart(e.clientX, e.clientY);
            });
            document.addEventListener('mousemove', (e) => onMove(e.clientX, e.clientY));
            document.addEventListener('mouseup', onEnd);

            // Touch events (desktop only — mobile uses bottom sheet)
            handle.addEventListener('touchstart', (e) => {
                if (isMobile()) return;
                if (e.target.closest('.minimize-btn')) return;
                onStart(e.touches[0].clientX, e.touches[0].clientY);
            }, { passive: true });
            document.addEventListener('touchmove', (e) => {
                if (!dragging) return;
                onMove(e.touches[0].clientX, e.touches[0].clientY);
            }, { passive: true });
            document.addEventListener('touchend', onEnd);

            // Suppress click on header after drag so it doesn't toggle bottom sheet
            handle.addEventListener('click', (e) => {
                if (moved) { e.stopImmediatePropagation(); moved = false; }
            }, true);
        }

        makeDraggable(sidebar, document.getElementById('sidebar-header'));
        makeDraggable(document.getElementById('legend'), document.getElementById('legend-header'));

        // ── Init ─────────────────────────────────────────────────────────
        loadEvents();

        if (window.innerWidth > 700) {
            map.panBy([-160, 0], { animate: false });
        }
    </script>
</body>
</html>
